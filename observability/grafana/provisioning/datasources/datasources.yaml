apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: grafanacloud-prom

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: grafanacloud-traces
    jsonData:
      tracesToMetrics:
        datasourceUid: grafanacloud-prom
